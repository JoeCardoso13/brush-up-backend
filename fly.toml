# fly.toml app configuration file generated for brush-up-py on 2026-04-10T09:44:58-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'brush-up-py'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile'

[env]
  BRUSH_UP_INPUT_BUDGET = '250000'
  BRUSH_UP_OUTPUT_BUDGET = '60000'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
